services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - VAULT_DIR=/vault
      - DB_PATH=/data/tasks.db
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - APP_PASSWORD=${APP_PASSWORD}
      - PASSKEY_STORE_PATH=/data/.passkey.json
    volumes:
      - vault:/vault
      - app_data:/data
    restart: unless-stopped
    depends_on:
      obsidian-sync:
        condition: service_started

  obsidian-sync:
    build:
      context: ./obsidian-sync
      dockerfile: Dockerfile
    environment:
      - OBSIDIAN_EMAIL=${OBSIDIAN_EMAIL}
      - OBSIDIAN_PASSWORD=${OBSIDIAN_PASSWORD}
      - OBSIDIAN_MFA=${OBSIDIAN_MFA:-}
      - OBSIDIAN_VAULT=${OBSIDIAN_VAULT}
    volumes:
      - vault:/vault
      - obsidian_sync_config:/root/.config/obsidian-headless
    restart: unless-stopped

volumes:
  vault:
    driver: local
  app_data:
    driver: local
  obsidian_sync_config:
    driver: local
